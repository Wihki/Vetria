version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: example\n      POSTGRES_PASSWORD: example\n      POSTGRES_DB: example_db\n    ports:\n      - "5432:5432"\n    volumes:\n      - db_data:/var/lib/postgresql/data\n\n  backend:\n    build:\n      context: ./backend\n    ports:\n      - "5000:5000"\n    depends_on:\n      - db\n\n  frontend:\n    build:\n      context: ./frontend\n    ports:\n      - "3000:3000"\n    depends_on:\n      - backend\n\nvolumes:\n  db_data: